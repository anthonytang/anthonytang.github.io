      eyebrow:'Earth · 1.00 AU', title:'about',
      body:'<p>Hi, I\'m Anthony! I\'m a software engineer from Austin, TX! I\'m a senior at <strong>Rice University</strong>, pursuing a BS in Computer Science and graduating May 2027 with a GPA of 3.81.</p><p>I\'ve always been curious how things work and loved building things of my own, which led me to CS, where I could combine problem-solving, creativity, and curiosity to build systems that help people.</p><p>I also enjoy reading, tennis, pickleball, and time with my dog! I played trombone and bass trombone for seven years, which taught me teamwork, discipline, and communication. Those experiences shape how I work: clarity, collaboration, and ownership.</p><p>I work across full-stack and AI/ML engineering, with a focus on large-scale backend systems, service architecture, CI/CD, and production observability. Alongside that I run interpretability research on LLMs, and design and ship consumer web and iOS applications.</p>',

      eyebrow:'Saturn · 9.54 AU', title:'work',
      body:'<p class="jh"><strong>Nextdoor</strong> · Software Engineering Intern <span class="dt">Summer 2026</span></p><ul><li>Designed and shipped a monitoring system for Nextdoor\'s Streaming ORM, instrumenting 8+ metric dimensions across production hot-path code and redesigning dashboards for real-time performance visibility.</li><li>Identified production data quality issues by debugging metric cost spikes, tracing root cause to a regex bug, and cutting observability costs by 50% through a carefully staged rollout.</li><li>Designed an error-capture system for latency-sensitive hot-path code, owning the software design from architecture through implementation.</li><li>Won Best in Show at a company-wide hackathon by building a NAM onboarding tool.</li></ul><p class="jh"><strong>WhyAI</strong> · Software Engineering Intern <span class="dt">Oct 2025 to Jan 2026</span></p><ul><li>Led a backend refactor migrating over 70% of the codebase to layered microservices along SOLID boundaries, eliminating accumulated technical debt.</li><li>Built cloud-native CI/CD with Pytest and Playwright, reaching 80% test coverage and 99.9% deployment reliability.</li></ul><p class="jh"><strong>Curriculum Associates</strong> · Software Engineering Intern <span class="dt">Summers 2024 and 2025</span></p><ul><li>Optimized data visualization for 500+ internal developers with a high-performance query over 100k+ points, a 50% productivity gain.</li><li>Led the React migration of a mission-critical asset management tool, improving responsiveness and maintainability.</li><li>Built Jira automation scripts removing 5+ hours of manual work per sprint.</li><li>Placed first in both company hackathons: an NLP transcript generator and a third-party SDK integration.</li></ul>',

  function buildSphere(p, src){

  function onScroll(){
    var span = window.innerHeight;
    scrollP = Math.max(0, Math.min(1, window.scrollY / span));
    var hero = document.getElementById('hero');
    hero.style.opacity = String(Math.max(0, 1 - scrollP*1.6));
  }
  window.addEventListener('scroll', onScroll, { passive:true });
  onScroll();

  function ease(t){ return 1 - Math.pow(1-t, 3); }

  c.addEventListener('mousemove', function(e){ mx = e.clientX; my = e.clientY; });
  c.addEventListener('mouseleave', function(){ mx = -1e5; my = -1e5; });

  function hitAt(qx, qy, pad){
    if (scrollP <= 0.55) return null;
    var best = null, bd = Infinity;
    for (var i=0;i<P.length;i++){
      var p = P[i];
      if (!p.k || p.px === undefined) continue;
      var R = (p.ext > 1 ? p.pr*p.ext : p.pr) + pad;
      var d = Math.hypot(qx - p.px, qy - p.py);
      if (d < R && d < bd){ bd = d; best = p; }
    }
    return best;
  }

  var panel = document.getElementById('panel');
  function open(p){
    sel = p;
    document.getElementById('p-eyebrow').textContent = p.eyebrow;
    document.getElementById('p-title').textContent = p.title;
    document.getElementById('p-body').innerHTML = p.body;
    document.getElementById('p-meta').innerHTML = p.meta.map(function(m){ return '<span>'+m+'</span>'; }).join('');
    panel.classList.add('open');
  }
  function close(){ sel = null; panel.classList.remove('open'); }
  document.getElementById('close').addEventListener('click', close);
  window.addEventListener('keydown', function(e){ if (e.key === 'Escape') close(); });
  var pd = null, lastTouch = 0;
  c.addEventListener('pointerdown', function(e){
    if (e.pointerType === 'mouse') return;
    pd = { x:e.clientX, y:e.clientY, t:performance.now() };
  });
  c.addEventListener('pointercancel', function(){ pd = null; });
  c.addEventListener('pointerup', function(e){
    if (e.pointerType === 'mouse' || !pd) return;
    var moved = Math.hypot(e.clientX - pd.x, e.clientY - pd.y);
    var dur = performance.now() - pd.t;
    pd = null;
    if (moved > 12 || dur > 600) return;
    lastTouch = performance.now();
    var t = hitAt(e.clientX, e.clientY, 26);
    if (t) { open(t); } else if (sel) { close(); }
  });
  c.addEventListener('click', function(){
    if (performance.now() - lastTouch < 800) return;
    if (hov) { open(hov); }
    else if (sel) { close(); }
  });
  document.querySelectorAll('#nav a').forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      window.scrollTo({ top: window.innerHeight, behavior: RM ? 'auto' : 'smooth' });
      var p = NAV.filter(function(q){ return q.k === a.dataset.go; })[0];
      if (p) open(p);
    });
  });

  function toScreen(wx, wy){
    return [ (wx - cam.x)*cam.z + W/2, (wy - cam.y)*cam.z + H/2 ];
  }

  function body(px,py,pr,p,lx,ly,dim){
    x.save(); x.globalAlpha = dim;
    x.beginPath(); x.arc(px,py,pr,0,Math.PI*2); x.clip();
    x.drawImage(p.sph, px-pr, py-pr, pr*2, pr*2);
    var g = x.createRadialGradient(px+lx*pr*0.5, py+ly*pr*0.5, pr*0.05, px+lx*pr*0.5, py+ly*pr*0.5, pr*1.9);
    g.addColorStop(0,'rgba(255,250,238,0.22)');
    g.addColorStop(0.38,'rgba(0,0,0,0)');
    g.addColorStop(0.70,'rgba(3,4,10,0.52)');
    g.addColorStop(1,'rgba(3,4,10,0.90)');
    x.fillStyle = g; x.fillRect(px-pr,py-pr,pr*2,pr*2);
    x.restore();
  }

  function reticle(px,py,rr,rot,a,span,lw){
    x.save(); x.translate(px,py); x.rotate(rot);
    x.strokeStyle = 'rgba(214,226,248,'+a+')'; x.lineWidth = lw; x.lineCap='round';
    for (var i=0;i<4;i++){
      var b = i*Math.PI/2;
      x.beginPath(); x.arc(0,0,rr, b-span/2, b+span/2); x.stroke();
    }
    x.restore();
  }

  var last = performance.now(), spin = 0;
  function frame(now){
    var dt = Math.min((now-last)/1000, 0.05); last = now;

    var frozen = !!(hov || sel);
    tScale += ((frozen ? 0 : 1) - tScale) * (RM ? 1 : 0.09);
    orbT += dt * (RM ? 0 : tScale) * (MOB ? 0.5 : 1);
    spin += dt * 0.22;

    var fz = fitZoom();
    var systemZ = fz * (1 + 6*(1 - ease(scrollP)));
    if (sel){
      camT.z = fz * 3.4;
      var wide = W > 720;
      var off = wide ? (Math.min(430, W*0.88)/2 + 20) / camT.z : 0;
      camT.x = sel.wx + off;
      camT.y = sel.wy + (wide ? 0 : -(H*0.33)/camT.z);
    } else {
      camT.z = systemZ;
      camT.x = 0;
      camT.y = -(H*0.46/systemZ) * (1 - ease(scrollP));
    }
    var k = RM ? 1 : 0.075;
    cam.x += (camT.x - cam.x)*k;
    cam.y += (camT.y - cam.y)*k;
    cam.z += (camT.z - cam.z)*k;

    x.fillStyle = '#05060B'; x.fillRect(0,0,W,H);
    for (var i=0;i<stars.length;i++){
      var s = stars[i];
      x.globalAlpha = s[2]; x.fillStyle = '#C9D6F0';
      x.fillRect(s[0]*W, s[1]*H, s[3], s[3]);
    }
    x.globalAlpha = 1;

    var sc = toScreen(0,0);
    P.forEach(function(p){
      x.beginPath(); x.arc(sc[0], sc[1], p.rad*cam.z, 0, Math.PI*2);
      x.strokeStyle = p.k ? 'rgba(96,118,170,0.46)' : 'rgba(60,70,95,0.15)';
      x.lineWidth = 1; x.stroke();
    });

    var sr = Math.max(9, 9*cam.z/fz);
    var sg = x.createRadialGradient(sc[0],sc[1],2,sc[0],sc[1],sr*2.8);
    sg.addColorStop(0,'#FFF3C4'); sg.addColorStop(0.35,'#F5D97A'); sg.addColorStop(1,'rgba(245,217,122,0)');
    x.fillStyle = sg; x.beginPath(); x.arc(sc[0],sc[1],sr*2.8,0,Math.PI*2); x.fill();

    hov = null;
    P.forEach(function(p){
      var a = p.ph + (orbT/p.T)*Math.PI*2;
      p.ca = Math.cos(a); p.sa = Math.sin(a);
      p.wx = p.ca*p.rad; p.wy = p.sa*p.rad;
      var s = toScreen(p.wx, p.wy);
      p.px = s[0]; p.py = s[1];
      p.pr = Math.max(2.5, p.r*cam.z*RS);
    });
    hov = hitAt(mx, my, 14);

    NAV.forEach(function(p){
      p.rr = p.pr*p.ext + 5 - p.h*2;
      p.lead = p.rr + 11;
      p.want = 0;
    });
    for (var a1=0;a1<NAV.length;a1++){
      for (var b1=a1+1;b1<NAV.length;b1++){
        var A = NAV[a1], B = NAV[b1];
        var axp = A.px + A.ca*(A.lead+A.want+6), ayp = A.py + A.sa*(A.lead+A.want+6);
        var bxp = B.px + B.ca*(B.lead+B.want+6), byp = B.py + B.sa*(B.lead+B.want+6);
        var dd = Math.hypot(axp-bxp, ayp-byp);
        if (dd < 34){ (B.rad >= A.rad ? B : A).want += (34 - dd); }
      }
    }
    NAV.forEach(function(p){ p.push += (p.want - p.push)*0.1; });

    var lblA = ease(Math.max(0, Math.min(1, (scrollP - 0.45)/0.4)));

    P.forEach(function(p){
      p.h += (((hov===p)?1:0) - p.h) * 0.14;
      var px=p.px, py=p.py, pr=p.pr;

      if (p.n === 'Saturn'){
        var rw = Math.max(0.9, pr*0.10);
        x.save(); x.translate(px,py); x.rotate(-0.42);
        var rings = [[1.42,0.55,'rgba(190,166,118,'],[1.72,1.0,'rgba(222,199,150,'],[2.02,0.85,'rgba(206,180,130,'],[2.30,0.4,'rgba(178,155,110,']];
        for (var ri=0; ri<rings.length; ri++){
          var rg = rings[ri];
          x.strokeStyle = rg[2] + (0.85*rg[1]) + ')';
          x.lineWidth = rw*rg[1];
          x.beginPath(); x.ellipse(0,0, pr*rg[0], pr*rg[0]*0.31, 0, 0, Math.PI*2); x.stroke();
        }
        x.restore();
      }
      body(px,py,pr,p,-p.ca,-p.sa, p.k ? 1 : 0.40);

      if (!lblA) return;
      x.globalAlpha = lblA;
      if (p.k){
        var al = Math.min(1, 0.60 + p.h*0.40 + (sel===p ? 0.1 : 0));
        reticle(px,py,p.rr, spin + (p===sel?0.4:0), al, 0.56 + p.h*0.24, 1.5 + p.h*0.4);
        var g0 = p.rr + 2.5, g1 = p.lead + p.push;
        x.beginPath();
        x.moveTo(px + p.ca*g0, py + p.sa*g0);
        x.lineTo(px + p.ca*g1, py + p.sa*g1);
        x.strokeStyle = 'rgba(214,226,248,'+(0.45 + p.h*0.45)+')'; x.lineWidth=1.2; x.stroke();
        var tx = px + p.ca*(g1+5), ty = py + p.sa*(g1+5);
        x.textAlign = p.ca >= 0 ? 'left' : 'right';
        x.textBaseline = 'middle';
        x.font = '500 13px "Space Grotesk", ui-sans-serif, sans-serif';
        x.fillStyle = (hov===p || sel===p) ? '#FFFFFF' : '#C6D3EC';
        x.fillText(p.k, tx, ty);
      } else {
        var t2x = px + p.ca*(pr+7), t2y = py + p.sa*(pr+7);
        x.textAlign = p.ca >= 0 ? 'left' : 'right';
        x.textBaseline = 'middle';
        x.font = '400 9px "IBM Plex Mono", monospace';
        x.fillStyle = '#2F3648';
        x.fillText(p.n.toLowerCase(), t2x, t2y);
      }
      x.globalAlpha = 1;
    });

    c.style.cursor = hov ? 'pointer' : 'default';
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
